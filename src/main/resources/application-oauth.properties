# OAuth2 / OpenID Connect Profile
# Activate with: --spring.profiles.active=oauth

ldapbrowser.auth.mode=oauth

# --- OIDC Provider Registration -----------------------------------
# Replace the values below with your identity provider's settings.
spring.security.oauth2.client.registration.oidc.client-id=
spring.security.oauth2.client.registration.oidc.client-secret=
spring.security.oauth2.client.registration.oidc.scope=openid,profile,email
spring.security.oauth2.client.provider.oidc.issuer-uri=

# --- Role Mapping --------------------------------------------------
# Claim path in the ID token (dot-path supported, e.g. realm_access.roles).
ldapbrowser.oauth.role-claim=roles
# Legacy property (not used for dynamic authorization).
ldapbrowser.oauth.admin-role=ldap-admin
# Legacy property (not used for dynamic authorization).
ldapbrowser.oauth.viewer-role=ldap-viewer
# Fallback app role name (must exist in roles.json) or DENY.
ldapbrowser.oauth.default-role=DENY

# --- OAuth mTLS (token endpoint) -----------------------------------
# Enable mTLS for OAuth token endpoint calls.
ldapbrowser.oauth.mtls.enabled=false
# SSL bundle name to use when mTLS is enabled.
ldapbrowser.oauth.mtls.ssl-bundle=
# When using mTLS with your IdP, set this to tls_client_auth
# or self_signed_tls_client_auth based on provider requirements.
spring.security.oauth2.client.registration.oidc.client-authentication-method=client_secret_basic
