# OAuth2 / OpenID Connect Profile
# Activate with: --spring.profiles.active=oauth

ldapbrowser.auth.mode=oauth

# --- OIDC Provider Registration -----------------------------------
# Replace the values below with your identity provider's settings.
spring.security.oauth2.client.registration.oidc.client-id=
spring.security.oauth2.client.registration.oidc.client-secret=
spring.security.oauth2.client.registration.oidc.scope=openid,profile,email
spring.security.oauth2.client.provider.oidc.issuer-uri=

# --- Role Mapping --------------------------------------------------
# Claim in the ID token that contains role names.
ldapbrowser.oauth.role-claim=roles
# Claim value mapped to ROLE_ADMIN.
ldapbrowser.oauth.admin-role=ldap-admin
# Claim value mapped to ROLE_VIEWER.
ldapbrowser.oauth.viewer-role=ldap-viewer
# Fallback role when no matching claim is found.
ldapbrowser.oauth.default-role=VIEWER
